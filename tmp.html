<!DOCTYPE html>
<html>
<head>
    <title>Click Map to Get Place Name (Satellite)</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="uns://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 85vh; width: 100%; }
        #info { padding: 10px; background: #222; color: white; }
    </style>
</head>
<body>
    <div id="info">Click anywhere on the map to get place name</div>
    <div id="map"></div>

    <script>
        // Initialize map (centered on DSKC / Northern Mongolia)
        const map = L.map('map').setView([49.5, 101.0], 5);

        // Satellite base layer (Esri)
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri, DigitalGlobe'
        }).addTo(map);

        // Optional: city labels on satellite
        L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/toner-labels/{z}/{x}/{y}.png', {
            opacity: 0.7
        }).addTo(map);

        // ==============================================
        // CLICK MAP → GET LOCATION NAME (Reverse Geocoding)
        // ==============================================
        map.on('click', async function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;

            // Use OpenStreetMap's FREE geocoding API (no API key needed)
            const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&zoom=10`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                
                // Get place/city name
                const placeName = data.display_name || "Unknown location";
                
                // Show result
                document.getElementById('info').innerHTML = `
                    <strong>Clicked Location:</strong><br>
                    Lat: ${lat.toFixed(4)}<br>
                    Lng: ${lng.toFixed(4)}<br>
                    Place: ${placeName}
                `;

                // Optional: Add a marker
                L.marker([lat, lng])
                    .addTo(map)
                    .bindPopup(`<b>${placeName}</b>`)
                    .openPopup();

            } catch (err) {
                document.getElementById('info').innerText = "Could not load location name";
            }
        });
    </script>
</body>
</html>
