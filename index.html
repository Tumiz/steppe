<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Steppe history on map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
    <style>
        body { margin: 0; }
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; cursor: crosshair; }
        .leaflet-control-geocoder { width: 280px; }
        .border-toggle {
            background: #fff;
            border: 2px solid rgba(0,0,0,0.2);
            padding: 4px 8px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
            white-space: nowrap;
        }
        .border-toggle:hover { background: #f4f4f4; }
        .border-toggle.active { background: #333; color: #fff; }
        .border-toggle.active:hover { background: #444; }
        .text-marker {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            font-weight: bold;
            font-size: 20px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.9);
            white-space: nowrap;
            text-align: center;
            line-height: 1.3;
            transform: translate(-50%, -50%);
        }
        .text-marker .time {
            font-size: 18px;
            font-weight: normal;
            opacity: 0.85;
        }
        .text-marker .haplo {
            font-size: 14px;
            font-weight: normal;
            opacity: 0.7;
        }
        .site-marker {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            font-weight: normal;
            font-size: 14px;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 1px 3px rgba(0,0,0,0.9);
            white-space: nowrap;
            text-align: center;
            transform: translate(-50%, 0);
        }
        .city-dot-marker {
            background: none !important;
            border: none !important;
            box-shadow: none !important;
            font-weight: normal;
            font-size: 11px;
            color: #fff;
            text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0 1px 3px rgba(0,0,0,0.9);
            white-space: nowrap;
            text-align: center;
            transform: translate(-50%, 0);
        }
        #time-slider-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px 4px;
            border-radius: 4px;
            width: 80%;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 0;
            font-size: 13px;
            color: #fff;
        }
        #time-slider-container label {
            text-align: center;
            padding-bottom: 2px;
        }
        #time-slider-ticks {
            position: relative;
            width: 100%;
            height: 18px;
        }
        .tick-label {
            position: absolute;
            font-size: 10px;
            top: 0;
            transform: translateX(-50%);
            white-space: nowrap;
            opacity: 0.85;
        }
        #time-slider-container input {
            width: 100%;
            cursor: pointer;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="time-slider-container">
        <label>Time: <span id="time-display">2000 BCE</span></label>
        <div id="time-slider-ticks"></div>
        <input type="range" id="time-slider">
    </div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script>
        var map = L.map('map').setView([35, 105], 4);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: '© Esri'
        }).addTo(map);

        var cultureLabelPane = map.createPane('cultureLabelPane');
        cultureLabelPane.style.zIndex = 650;

        var bordersLayer;
        var cultureBordersLayer = L.layerGroup();
        var markersGroup = L.layerGroup().addTo(map);
        var siteLabelsLayer = L.layerGroup();
        var sitesDotsLayer = L.layerGroup();
        var localMarkers = [];
        var cultureItems = [];
        var oldestYear = -Infinity;
        var newestYear = Infinity;
        function parseTimeRange(str) {
            var s = str.replace(/^c\.?\s*/i, '').trim();
            var parts = s.split(/[–\-]/);
            if (parts.length !== 2) return null;
            var start = parseInt(parts[0].trim());
            var end = parseInt(parts[1].trim().replace(/\s*BCE\s*$/, ''));
            if (isNaN(start) || isNaN(end)) return null;
            return { start: start, end: end };
        }

        // Load local JSON markers
        fetch('markers.json')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                function buildPopupContent(item) {
                    var html = '<b>' + item.name + '</b><br>' + (item.desc || '');
                    if (item.haplogroups) {
                        html += '<br><b>Main Y-DNA haplogroups:</b> ' + item.haplogroups;
                    }
                    if (item.papers && item.papers.length > 0) {
                        html += '<br><hr style="margin:4px 0"><b>Related papers:</b><br>';
                        item.papers.forEach(function(p) {
                            html += '• <a href="' + p.url + '" target="_blank" rel="noopener">' + p.title + '</a><br>';
                        });
                    }
                    return html;
                }

                data.forEach(function(item, idx) {
                    var color = item.color;

                    var parsed = parseTimeRange(item.time);
                    if (parsed) {
                        if (parsed.start > oldestYear) oldestYear = parsed.start;
                        if (parsed.end < newestYear) newestYear = parsed.end;
                    }

                    var icon = L.divIcon({
                        className: 'text-marker',
                        html: '<span style="color:' + color + '">' + item.name + '</span><br><span class="time" style="color:' + color + '">' + (item.time || '') + '</span>' + (item.haplogroups ? '<br><span class="haplo" style="color:' + color + '">' + item.haplogroups + '</span>' : ''),
                        iconSize: null,
                        iconAnchor: [0, 0]
                    });
                    var marker = L.marker([item.lat, item.lng], { icon: icon, pane: 'cultureLabelPane' })
                        .addTo(markersGroup)
                        .bindPopup(buildPopupContent(item));
                    localMarkers.push({
                        name: item.name,
                        center: L.latLng(item.lat, item.lng),
                        marker: marker,
                        desc: item.desc
                    });

                    var poly = null;
                    if (item.borders && item.borders.length > 0) {
                        poly = L.polygon(item.borders, {
                            color: color,
                            weight: 2,
                            opacity: 0.8,
                            fillColor: color,
                            fillOpacity: 0.12,
                            interactive: false
                        }).addTo(cultureBordersLayer);
                    }

                    var siteDotMarkers = [];
                    var siteLabelMarkers = [];
                    if (item.sites && item.sites.length > 0) {
                        item.sites.forEach(function(site) {
                            var siteMarker = L.circleMarker([site.lat, site.lng], {
                                radius: 6,
                                color: '#fff',
                                weight: 1.5,
                                fillColor: color,
                                fillOpacity: 0.85
                            }).addTo(sitesDotsLayer);
                            siteMarker.bindPopup('<b>' + site.name + '</b><br>' + (site.desc || ''));
                            siteDotMarkers.push(siteMarker);
                            var siteIcon = L.divIcon({
                                className: 'site-marker',
                                html: '<span style="color:#fff">' + site.name + '</span>',
                                iconSize: null,
                                iconAnchor: [-10, 18]
                            });
                            var labelMarker = L.marker([site.lat, site.lng], { icon: siteIcon, interactive: false }).addTo(siteLabelsLayer);
                            siteLabelMarkers.push(labelMarker);
                        });
                    }

                    cultureItems.push({
                        startYear: parsed ? parsed.start : null,
                        endYear: parsed ? parsed.end : null,
                        marker: marker,
                        polygon: poly,
                        siteDots: siteDotMarkers,
                        siteLabels: siteLabelMarkers
                    });
                });

                // Set up time slider
                var slider = document.getElementById('time-slider');
                var display = document.getElementById('time-display');
                var defaultYear = 2000;
                if (oldestYear > -Infinity && newestYear < Infinity) {
                    slider.min = -oldestYear;
                    slider.max = -newestYear;
                    slider.value = -Math.min(Math.max(defaultYear, newestYear), oldestYear);
                    display.textContent = (-slider.value) + ' BCE';

                    // Add period ticks
                    var tickMin = parseInt(slider.min);
                    var tickRange = parseInt(slider.max) - tickMin;
                    var rightEdge = parseInt(-slider.max);
                    var periods = [
                        { start: oldestYear, end: 3300, label: 'Neolithic' },
                        { start: 3300, end: 2600, label: 'Copper Age' },
                        { start: 2600, end: 800, label: 'Bronze Age' },
                        { start: 800, end: rightEdge, label: 'Iron Age' }
                    ];
                    var ticksEl = document.getElementById('time-slider-ticks');
                    for (var i = 0; i < periods.length; i++) {
                        var p = periods[i];
                        var mid = (p.start + p.end) / 2;
                        var pos = ((-mid) - tickMin) / tickRange * 100;
                        var span = document.createElement('span');
                        span.className = 'tick-label';
                        span.style.left = pos + '%';
                        span.textContent = p.label;
                        ticksEl.appendChild(span);
                    }
                }

                function applyTimeFilter(year) {
                    cultureItems.forEach(function(item) {
                        var t0 = item.startYear, t1 = item.endYear;
                        var visible = t0 !== null && t1 !== null && year <= t0 && year >= t1;

                        if (visible) {
                            if (!markersGroup.hasLayer(item.marker)) markersGroup.addLayer(item.marker);
                        } else {
                            if (markersGroup.hasLayer(item.marker)) markersGroup.removeLayer(item.marker);
                        }

                        if (item.polygon) {
                            if (visible) {
                                if (!cultureBordersLayer.hasLayer(item.polygon)) cultureBordersLayer.addLayer(item.polygon);
                            } else {
                                if (cultureBordersLayer.hasLayer(item.polygon)) cultureBordersLayer.removeLayer(item.polygon);
                            }
                        }

                        item.siteDots.forEach(function(dot) {
                            if (visible) {
                                if (!sitesDotsLayer.hasLayer(dot)) sitesDotsLayer.addLayer(dot);
                            } else {
                                if (sitesDotsLayer.hasLayer(dot)) sitesDotsLayer.removeLayer(dot);
                            }
                        });

                        item.siteLabels.forEach(function(label) {
                            if (visible) {
                                if (!siteLabelsLayer.hasLayer(label)) siteLabelsLayer.addLayer(label);
                            } else {
                                if (siteLabelsLayer.hasLayer(label)) siteLabelsLayer.removeLayer(label);
                            }
                        });
                    });
                }

                slider.addEventListener('input', function() {
                    var year = -parseInt(this.value);
                    display.textContent = year + ' BCE';
                    applyTimeFilter(year);
                });

                applyTimeFilter(-parseInt(slider.value));
            })
            .catch(function() {});

        // Custom geocoder: search local markers first, fall back to Nominatim
        var markerGeocoder = {
            geocode: function(query, callback) {
                var results = [];
                var q = query.toLowerCase();
                for (var i = 0; i < localMarkers.length; i++) {
                    var m = localMarkers[i];
                    if (m.name.toLowerCase().indexOf(q) !== -1) {
                        results.push({
                            name: m.name,
                            center: m.center,
                            bbox: null
                        });
                    }
                }
                if (results.length > 0) {
                    callback(results);
                } else {
                    L.Control.Geocoder.nominatim().geocode(query, callback);
                }
            }
        };

        L.Control.geocoder({
            geocoder: markerGeocoder,
            placeholder: 'Search',
            errorMessage: 'Not found',
            showResultIcons: true,
            collapsed: false,
            defaultMarkGeocode: false
        })
        .on('markgeocode', function(e) {
            var center = e.geocode.center;
            map.setView(center, 12);
            // Open popup if it's a local marker
            for (var i = 0; i < localMarkers.length; i++) {
                if (localMarkers[i].center.equals(center)) {
                    localMarkers[i].marker.openPopup();
                    return;
                }
            }
            L.popup()
                .setLatLng(center)
                .setContent(e.geocode.name)
                .openOn(map);
        })
        .addTo(map);

        // Country borders & features for reverse geocoding
        var countryFeatures = [];
        function pointInPolygon(lat, lng) {
            var pt = [lng, lat];
            for (var i = 0; i < countryFeatures.length; i++) {
                var feat = countryFeatures[i];
                var rings = feat.geometry.type === 'Polygon' ? [feat.geometry.coordinates] : feat.geometry.coordinates;
                for (var r = 0; r < rings.length; r++) {
                    var ring = rings[r][0];
                    var inside = false;
                    for (var k = 0, j = ring.length - 1; k < ring.length; j = k++) {
                        var xi = ring[k][0], yi = ring[k][1];
                        var xj = ring[j][0], yj = ring[j][1];
                        if ((yi > pt[1]) !== (yj > pt[1]) && pt[0] < (xj - xi) * (pt[1] - yi) / (yj - yi) + xi) {
                            inside = !inside;
                        }
                    }
                    if (inside) return feat.properties.name;
                }
            }
            return null;
        }
        fetch('https://unpkg.com/world-atlas@2.0.2/countries-110m.json')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var borders = topojson.mesh(data, data.objects.countries, function(a, b) { return a !== b; });
                bordersLayer = L.geoJSON(borders, {
                    style: {
                        color: '#fff',
                        weight: 1.5,
                        opacity: 0.8,
                        fill: false
                    }
                }).addTo(map);
                countryFeatures = topojson.feature(data, data.objects.countries).features;
            });

        // Toggle country borders button
        var bordersVisible = true;
        var ToggleBorders = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                var btn = L.DomUtil.create('button', 'border-toggle active');
                btn.innerHTML = 'Country border';
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function() {
                    bordersVisible = !bordersVisible;
                    if (bordersLayer) {
                        if (bordersVisible) {
                            bordersLayer.addTo(map);
                            btn.classList.add('active');
                        } else {
                            map.removeLayer(bordersLayer);
                            btn.classList.remove('active');
                        }
                    }
                });
                return btn;
            }
        });
        map.addControl(new ToggleBorders());

        // Toggle culture borders button
        var cultureBordersVisible = false;
        var ToggleCultureBorders = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                var btn = L.DomUtil.create('button', 'border-toggle');
                btn.innerHTML = 'Culture border';
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function() {
                    cultureBordersVisible = !cultureBordersVisible;
                    if (cultureBordersVisible) {
                        cultureBordersLayer.addTo(map);
                        btn.classList.add('active');
                    } else {
                        map.removeLayer(cultureBordersLayer);
                        btn.classList.remove('active');
                    }
                });
                return btn;
            }
        });
        map.addControl(new ToggleCultureBorders());

        // Toggle key sites (dots + names) button
        var keySitesVisible = false;
        var ToggleKeySites = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                var btn = L.DomUtil.create('button', 'border-toggle');
                btn.innerHTML = 'Key site';
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function() {
                    keySitesVisible = !keySitesVisible;
                    if (keySitesVisible) {
                        sitesDotsLayer.addTo(map);
                        siteLabelsLayer.addTo(map);
                        btn.classList.add('active');
                    } else {
                        map.removeLayer(sitesDotsLayer);
                        map.removeLayer(siteLabelsLayer);
                        btn.classList.remove('active');
                    }
                });
                return btn;
            }
        });
        map.addControl(new ToggleKeySites());

        // Toggle modern cities button
        var citiesVisible = false;
        var ToggleCities = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function() {
                var btn = L.DomUtil.create('button', 'border-toggle');
                btn.innerHTML = 'Modern cities';
                L.DomEvent.disableClickPropagation(btn);
                L.DomEvent.on(btn, 'click', function() {
                    citiesVisible = !citiesVisible;
                    if (citiesVisible) {
                        citiesLayer.addTo(map);
                        btn.classList.add('active');
                    } else {
                        map.removeLayer(citiesLayer);
                        btn.classList.remove('active');
                    }
                });
                return btn;
            }
        });
        map.addControl(new ToggleCities());

        // Load city dataset for client-side reverse geocoding
        var citiesData = [];
        var citiesLayer = L.layerGroup();
        var citiesLabelsLayer = L.layerGroup();
        fetch('cities.json')
            .then(function(res) { return res.json(); })
            .then(function(data) {
                citiesData = data;
                data.forEach(function(city) {
                    var dot = L.circleMarker([city.lat, city.lng], {
                        radius: 4,
                        color: '#000',
                        weight: 1.5,
                        fillColor: 'white',
                        fillOpacity: 0.9
                    }).bindPopup('<b>' + city.name + '</b><br>' + (city.state || '') + (city.state && city.country ? '<br>' : '') + (city.country || ''));
                    citiesLayer.addLayer(dot);
                    var label = L.divIcon({
                        className: 'city-dot-marker',
                        html: city.name,
                        iconSize: null,
                        iconAnchor: [-10, 16]
                    });
                    L.marker([city.lat, city.lng], { icon: label, interactive: false }).addTo(citiesLabelsLayer);
                });
                citiesLayer.addLayer(citiesLabelsLayer);
                if (citiesVisible) citiesLayer.addTo(map);
            })
            .catch(function() {});

        function haversineKm(lat1, lon1, lat2, lon2) {
            var R = 6371;
            var dLat = (lat2 - lat1) * Math.PI / 180;
            var dLon = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function nearestCity(lat, lng) {
            var closest = null, minDist = Infinity;
            for (var i = 0; i < citiesData.length; i++) {
                var d = haversineKm(lat, lng, citiesData[i].lat, citiesData[i].lng);
                if (d < minDist) { minDist = d; closest = citiesData[i]; }
            }
            return { city: closest, distKm: Math.round(minDist) };
        }

        // Click on map to reverse-geocode
        var popup = L.popup({ closeButton: true, maxWidth: 300 });
        map.on('click', function(e) {
            var lat = e.latlng.lat, lng = e.latlng.lng;
            var result = nearestCity(lat, lng);
            var country = countryFeatures.length > 0 ? pointInPolygon(lat, lng) : null;
            if (!country && result.city) country = result.city.country;
            var html = '';
            if (result.city && result.distKm < 200) {
                html = '<b>' + result.city.name + '</b>';
                if (result.city.state) html += '<br>' + result.city.state;
                if (country) html += '<br>' + country;
                html += '<br><small>' + result.distKm + ' km away</small>';
            } else {
                html = country ? '<b>' + country + '</b>' : '<i>Open area</i>';
            }
            html += '<hr style="margin:4px 0"><small>' + lat.toFixed(4) + ', ' + lng.toFixed(4) + '</small>';
            popup.setLatLng(e.latlng).setContent(html).openOn(map);
        });

        // Visitor counter
        var VisitorControl = L.Control.extend({
            options: { position: 'bottomleft' },
            onAdd: function() {
                var div = L.DomUtil.create('div', 'visitor-counter');
                div.innerHTML = '<span id="fc-46272"></span>';
                return div;
            }
        });
        map.addControl(new VisitorControl());

        var fcr = Math.floor(Math.random()*99999999999);
        var _fcc = _fcc || []; _fcc.push(["46272"]); _fcc.push(["mint"]);
        (function(){
            var fc = document.createElement("script"); fc.async = true;
            fc.src = "https://www.imcounter.com/fcount.php?rnd=" + fcr;
            var sc = document.getElementById("fc-46272");
            sc.appendChild(fc);
        })();
    </script>
</body>
</html>
